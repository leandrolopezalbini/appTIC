  <style>
    /* ================== ESTILOS GLOBALES / BASE ================== */
    :root {
      --azul-principal: #0d47a1;
      --verde-principal: #4caf50;
      --texto: #212121;
      --fondo: #f5f5f5;
      --blanco: #FFFFFF;
      --color-nuevo: #4db6ac;
      --color-instalacion: #f44336;
      --color-energia: #ff9800;
      --color-conectividad: #66bb6a;
      --color-switch: #5e35b1;
      --color-informes: #26a69a;
      --color-mapa: #0d47a1;
    }

    .status-blob:hover {
      background-color: #f5f5f5;
    }

    .status-done {
      color: #2e7d32;
    }

    /* Verde */
    .status-pending {
      color: #f9a825;
    }

    /* Amarillo/Naranja */
    .status-waiting {
      color: #9e9e9e;
    }

    /* Gris */
    .status-error {
      color: #c62828;
    }

    /* Rojo */
    body {
      font-family: 'Roboto', sans-serif;
      background: var(--fondo);
      color: var(--texto);
      padding: 20px;
      font-size: 16px;
      /* Ajustado de 18px para mejor base */
    }

    h1 {
      text-align: center;
      color: var(--azul-principal);
      margin-bottom: 20px;
      font-size: 3rem;
      /* Ajustado para desktop */
    }

    .icono-izq {
      width: 150px;
      height: auto;
      margin-right: 15px;
      vertical-align: middle;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .status-blob {
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 4px;
      padding: 5px;
      transition: 0.3s;
    }

    #filtrosBusqueda {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      padding: 10px 0;
    }

    #filtrosBusqueda label {
      margin-right: 5px;
    }

    /* Estilos para la lista de resultados del buscador */
    #lista-resultados-maestros .collection-item.avatar {
      padding-left: 72px;
      min-height: 72px;
    }

    #lista-resultados-maestros .collection-item.avatar i.circle {
      position: absolute;
      left: 15px;
      top: 15px;
      width: 42px;
      height: 42px;
      line-height: 42px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
    }

    #lista-resultados-maestros .collection-item.avatar i.blue {
      background-color: #2196F3;
    }

    #lista-resultados-maestros .collection-item.avatar i.red {
      background-color: #f44336;
    }

    #lista-resultados-maestros .collection-item.avatar i.green {
      background-color: #4CAF50;
    }

    #lista-resultados-maestros .collection-item.avatar i.orange {
      background-color: #FF9800;
    }

    #lista-resultados-maestros .collection-item.avatar i.purple {
      background-color: #9C27B0;
    }

    #lista-resultados-maestros .collection-item.avatar i.amber {
      background-color: #FFC107;
      color: #333 !important;
    }

    /* Mejorar modal de detalle para UX */
    .modal {
      max-width: 460px;
      width: 90%;
    }

    .modal .modal-content {
      padding: 20px 24px;
    }

    .modal .modal-footer {
      padding-right: 24px;
    }

    /* ================== TARJETAS DEL PANEL ================== */
    .cuadricula-panel {
      display: grid;
      gap: 20px;
      margin: 20px auto;
      max-width: 1100px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }

    button:disabled {
      background-color: #9e9e9e !important;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .boton-tarjeta {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 14rem;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      cursor: pointer;
      background-color: var(--color-conectividad);
      color: var(--blanco);
      font-weight: bold;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      padding: 20px;
      text-align: center;
    }

    .boton-tarjeta:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      filter: brightness(1.1);
    }

    /* mejoras UX para listas */
    .collection-item:hover {
      background-color: #fafafa;
    }

    /* botones del modal más amplios en móvil */
    #contenedor-botones-accion .btn {
      font-size: 0.95rem;
      justify-content: start;
      padding-left: 12px;
    }

    #contenedor-botones-accion .btn i.left {
      margin-right: 8px;
    }

    /* Colores por tarjeta */
    .tarjeta-nuevo {
      background-color: var(--color-nuevo);
    }

    .tarjeta-instalacion {
      background-color: var(--color-instalacion);
    }

    .tarjeta-energia {
      background-color: var(--color-energia);
    }

    .tarjeta-conectividad {
      background-color: var(--color-conectividad);
    }

    .tarjeta-informes {
      background-color: var(--color-informes);
    }

    .tarjeta-mapa {
      background-color: var(--color-mapa);
    }

    .tarjeta-switch {
      background-color: var(--color-switch);
    }

    .boton-tarjeta span {
      font-size: 2.5rem;
      line-height: 1.2;
      margin-top: 10px;
    }

    .boton-tarjeta .material-icons {
      font-size: 4.5rem;
      display: block;
      /* Corregido: antes estaba en none */
    }

    /* Bordes laterales de colores para las tareas */

    .border-left-blue {
      border-left: 5px solid #2196F3 !important;
    }

    .border-left-green {
      border-left: 5px solid #4CAF50 !important;
    }

    .border-left-orange {
      border-left: 5px solid #FF9800 !important;
    }

    .card.hoverable:hover {
      transform: translateY(-2px);
      transition: all 0.2s ease-in-out;
    }

    .card.hoverable:active {
      transform: scale(0.98);
      /* Efecto de click en móvil */
    }

    /* ================== FORMULARIOS Y ELEMENTOS ================== */
    .page-content {
      display: none;
      max-width: 900px;
      margin: 0 auto;
    }

    .active-page {
      display: block;
      animation: fadeInUp 0.4s ease-out;
    }

    .contenedor-formulario {
      background-color: var(--blanco);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
    }

    .btn-volver {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #757575;
      color: var(--blanco);
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      margin-bottom: 20px;
      transition: background 0.2s;
    }

    .btn-volver:hover {
      background: #424242;
    }

    /* Inputs corregidos para visibilidad */
    .contenedor-formulario .input-field input,
    .contenedor-formulario .input-field textarea {
      border: 1px solid #ccc !important;
      padding: 12px !important;
      border-radius: 6px !important;
      font-size: 1.1rem !important;
      box-sizing: border-box !important;
    }

    /* Estilo de Radio Buttons*/
    .radio-group {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin: 15px 0;
    }

    .radio-option label span {
      padding: 12px 20px 12px 45px !important;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1.2rem !important;
      display: inline-block;
      position: relative;
    }

    /* ================== RESPONSIVIDAD ================== */
    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }

      .boton-tarjeta {
        height: 12rem;
      }

      .boton-tarjeta span {
        font-size: 1.4rem;
      }

      .boton-tarjeta .material-icons {
        font-size: 3.5rem;
      }

      .contenedor-formulario {
        padding: 15px;
      }

      .grid-campos-dobles {
        flex-direction: column;
        gap: 10px;
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
