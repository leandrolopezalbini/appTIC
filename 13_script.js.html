    /**
     * FILTRAR TABLA: Muestra/oculta filas según checkboxes seleccionados
     */
    function filtrarTabla(tableId = 'tabla-busqueda', attributeName = 'data-tipo') {
      const tabla = document.getElementById(tableId) || document.querySelector('table');
      if (!tabla) {
        console.log('Tabla no encontrada:', tableId);
        return;
      }

      const filas = tabla.querySelectorAll('tbody tr');
      const tiposSeleccionados = [];

      document.querySelectorAll('#filtrosBusqueda input[type="checkbox"]:checked').forEach(chk => {
        tiposSeleccionados.push(chk.value);
      });

      const mostrarTodos = tiposSeleccionados.length === 0;

      filas.forEach(fila => {
        const tipo = fila.getAttribute(attributeName);
        const debeVisualizar = mostrarTodos || tiposSeleccionados.includes(tipo);
        fila.style.display = debeVisualizar ? '' : 'none';
      });
    }

        window.scrollTo(0, 0);
        inicializarSeccionEspecifica(pageId);
      }
    }
    function getColorPorTipo(tipo) {
      const t = (tipo || "").toUpperCase();
      if (t.includes("CAMARA")) return "blue";
      if (t.includes("TABLERO")) return "green";
      if (t.includes("SWITCH")) return "purple";
      if (t.includes("ALARMA")) return "red";
      if (t.includes("TAREA") || t.includes("MANTENIMIENTO")) return "orange";
      return "grey"; // Color por defecto
    }

          const label = pDestino.querySelector('.label-activo-comun');
          if (input) input.value = idActivo;
          if (label) label.innerText = idActivo;

      showPage(pagina);

    function dibujarFichaTecnica(id, tipo, data) {
      const contenedor = document.getElementById('contenedor-detalle-ficha');
      if (!contenedor) return;

      let html = '<form id="form-edicion-activo">';
      html += '<ul class="collection with-header shadow-fuerte">';
      html += '<li class="collection-header blue darken-4 white-text">';
      html += '<h5 style="margin:0;">' + id + '</h5>';
      html += '<p style="margin:0; opacity:0.8;">Tipo: ' + tipo + '</p></li>';

      for (const campo in data.detalles) {
        const valor = data.detalles[campo] || '';
        const campoMayus = campo.toUpperCase();
        const esBloqueado = (campoMayus === 'ID' || campoMayus.includes('FECHA')) ? 'readonly' : '';

        html += '<li class="collection-item" style="padding: 10px 20px;">';

        if (campoMayus.includes('ESTADO') || campoMayus.includes('PRIORIDAD')) {
          const opciones = campoMayus.includes('PRIORIDAD')
            ? ['ALTA', 'MEDIA', 'BAJA']
            : ['OPERATIVO', 'FUERA DE SERVICIO', 'EN REPARACION', 'PENDIENTE', 'RESUELTA'];

          html += '<label style="font-size: 0.8rem;">' + campo + '</label>';
          html += '<select name="' + campo + '" class="browser-default" style="display:block; border:1px solid #ddd; border-radius:4px; padding:5px;">';
          opciones.forEach(opt => {
            const selected = (valor.toString().toUpperCase() === opt) ? 'selected' : '';
            html += '<option value="' + opt + '" ' + selected + '>' + opt + '</option>';
          });
          html += '</select>';
        } else {
          html += '<div class="input-field" style="margin:0;">';
          html += '<input type="text" name="' + campo + '" id="edit-' + campo + '" value="' + valor + '" ' + esBloqueado + ' style="margin-bottom: 5px; height: 2rem;">';
          html += '<label class="active" for="edit-' + campo + '">' + campo + '</label></div>';
        }
        html += '</li>';
      }

      html += '</ul>';
      html += '<div style="margin-top:20px; display:flex; gap:10px;">';
      html += '<button type="button" class="btn-large grey lighten-1 waves-effect btn-volver" style="flex:1;">CANCELAR</button>';
      html += '<button type="submit" class="btn-large green darken-2 waves-effect" style="flex:2;"><i class="material-icons left">save</i> GUARDAR CAMBIOS</button>';
      html += '</div></form>';

      contenedor.innerHTML = html;

      // RE-VINCULAR BOTÓN VOLVER (Importante porque es dinámico)

        e.preventDefault();
        const formData = new FormData(this);

            }

function volverAlPanel() {
  // 1. Ocultar todos los formularios/páginas
  const paginas = document.querySelectorAll('.page-content');
  paginas.forEach(p => p.style.display = 'none');
  // 2. Mostrar el panel principal
  const panel = document.getElementById('panel-page') || document.getElementById('panel');
  if (panel) panel.style.display = 'block';
  // Limpieza extra: vaciar buscador para evitar confusión
  const inp = document.getElementById('inputMaestro');
  if (inp) inp.value = "";
  const lista = document.getElementById('listaResultadosMaestros');
  if (lista) lista.innerHTML = "";
  // 3. Si el usuario es técnico, refrescar sus tareas
  if (USUARIO_ACTUAL.rol === 'TECNICO') {
    cargarTareasTecnico();
  }

  // 4. Si el usuario es admin/secretario, refrescar la data maestra
  if (USUARIO_ACTUAL.rol === 'ADMIN' || USUARIO_ACTUAL.rol === 'SECRETARIO') {
    cargarDataMaestra();
  }
  // 5. Cerrar cualquier modal que haya quedado abierto
  const modales = document.querySelectorAll('.modal');
  modales.forEach(m => {
    const instance = M.Modal.getInstance(m);
    if (instance) instance.close();
  });
}

function obtenerIcono(tipo) {
  const icons = {
    'CAMARAS': 'videocam',
    'ALARMAS': 'notifications',
    'SWITCHES': 'router',
    'TABLEROS': 'settings_input_component',
    'TAREAS': 'assignment'
  };
  return icons[tipo.toUpperCase()] || 'settings';
}

function renderIconoEtapa(id, etapa, estado) {
  let icono = "hourglass_empty", clase = "status-waiting", funcionClick = "";
  if (["OK", "CONECTADA", "AUTORIZADA"].includes(estado)) {
    icono = "check_circle"; clase = "status-done";
  } else if (["PENDIENTE", "PEDIDO", "SOLICITADA"].includes(estado)) {
    icono = (etapa === 'ENERGIA') ? "bolt" : "priority_high";
    clase = "status-pending";
    if (etapa === 'ENERGIA') funcionClick = `onclick="abrirFormularioEnergia('${id}')"`;
    else if (etapa === 'AUTORIZACION' && (USUARIO_ACTUAL.rol === 'ADMIN' || USUARIO_ACTUAL.rol === 'SECRETARIO')) {
      funcionClick = `onclick="showPage('solicitudes')"`;
    }
  }
  return `<div class="status-blob ${clase}" ${funcionClick}><i class="material-icons">${icono}</i></div>`;
}

function escaparHTML(texto) {
  return texto
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function abrirFichaTecnica(id, tipo) {
  // 1. Cerrar modal si estuviera abierto

  // 2. Ir a la página de detalle

  const contenedor = document.getElementById('contenedor-detalle-ficha');
  contenedor.innerHTML = `

            </div>
        </div>
        <p class="grey-text">Cargando datos de ${id}...</p>
    </div>`;

    .withSuccessHandler(res => {

      }
    })
    .withFailureHandler(err => {
      M.toast({ html: 'Error de conexión', classes: 'red' });
    })
    .obtenerDetalleActivo(id, tipo);
}

function abrirMantenimientoTecnico(id) {
  // 1. Cerramos primero el modal de acciones
  const modalElement = document.getElementById('modal-detalle');

    const modal = M.Modal.getInstance(modalElement);

    showPage('mantenimiento-checklist-page');

    const activo = DATA_MAESTRA.find(a => a.ID === id);
    const nombre = activo ? (activo.DIRECCION || "Sin dirección") : "";
    const infoDiv = document.getElementById('maint-info-activo');
    if (infoDiv) {
      infoDiv.innerHTML = `<b>ID:</b> ${id} <br> <b>Ubicación:</b> ${nombre}`;
    }

    const campoId = document.getElementById('maint-id');

    if (campoId) campoId.value = id;

    M.updateTextFields();
    M.toast({ html: 'Iniciando mantenimiento en sitio: ' + id, classes: 'green' });
  }, 300);
}

    function obtenerGPS() {
      const status = document.getElementById('ubicacionStatus');
      if (!status) return;
      status.innerHTML = "Buscando satélites...";
      status.style.color = "orange";
      if (!navigator.geolocation) { status.innerHTML = "No soportado"; return; }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          document.getElementById('instalacionLatitud').value = pos.coords.latitude.toFixed(6);
          document.getElementById('instalacionLongitud').value = pos.coords.longitude.toFixed(6);
          M.updateTextFields();
          status.innerHTML = "✅ Ubicación obtenida.";
          status.style.color = "green";
        },
        (err) => { status.innerHTML = "❌ Error: " + err.message; status.style.color = "red"; },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    function enviarAltaNueva() {
      const btn = document.querySelector('#form-nuevo-tablero button[type="submit"]');
      const data = {
        tipoActivo: document.getElementById('tipoActivo').value,
        nombre: document.getElementById('direccion').value.trim(),
        latitud: document.getElementById('instalacionLatitud').value,
        longitud: document.getElementById('instalacionLongitud').value,
        observaciones: document.getElementById('observaciones').value.trim()
      };

      // Validación estricta
      if (!data.tipoActivo || data.nombre.length < 5) {
        M.toast({ html: '❌ Error: La dirección es demasiado corta o falta el tipo.', classes: 'red' });
        return;
      }

      if (!data.latitud || !data.longitud) {
        if (!confirm("No se obtuvo GPS. ¿Desea enviar la solicitud sin coordenadas?")) return;
      }

      btn.disabled = true;

      google.script.run
        .withSuccessHandler(res => {
          btn.disabled = false;
          if (res.success) {
            M.toast({ html: '✅ ' + res.message, classes: 'green' });
            document.getElementById('form-nuevo-tablero').reset();
            showPage('panel');
            actualizarBadgeUI();
          } else { M.toast({ html: '❌ ' + res.message, classes: 'red' }); }
        })
        .procesarSolicitudUnificada(data);
    }

      // 2. Bloqueo del botón y Cartel de Cargando

        }

      google.script.run
        .withSuccessHandler(res => {

          btn.disabled = false;
        })
        .procesarSolicitudUnificada(data);

    function prepararFinalizacion(idTarea, tipo, direccion) {
      // Seteamos los campos (Asegúrate que estos IDs existan en tu HTML)
      document.getElementById('idTareaHidden').value = idTarea;
      document.getElementById('tipoActivoHidden').value = tipo;
      document.getElementById('direccionFinal').value = direccion;

      setTimeout(() => { M.updateTextFields(); }, 200);

    /** 3. Enviar la finalización al servidor */
    function enviarFinalizacionInstalacion() {
      const btn = event.currentTarget; // El botón presionado

      const datosFinales = {
        tipoAccion: 'FINALIZAR_INSTALACION',
        idTarea: document.getElementById('idTareaHidden').value,
        tipoActivo: document.getElementById('tipoActivoHidden').value,
        idDefinitivo: document.getElementById('idDefinitivo').value.toUpperCase().trim(),
        direccion: document.getElementById('direccionFinal').value.trim(),
        ip: document.getElementById('ipInstalacion').value.trim(),
        latitud: document.getElementById('latFinal').value,
        longitud: document.getElementById('lngFinal').value,
        observaciones: document.getElementById('obsFinales')?.value || "Instalación finalizada vía App Técnica."
      };
      // Validación
      if (!datosFinales.idDefinitivo || !datosFinales.ip) {
        M.toast({ html: '❌ ID e IP son obligatorios', classes: 'red' });
        return;
      }
      btn.disabled = true;
      const loadToast = M.toast({ html: 'Enviando y cerrando ticket...', displayLength: 10000 });
      google.script.run
        .withSuccessHandler(res => {
          loadToast.dismiss();
          btn.disabled = false;
          if (res.success) {
            M.toast({ html: '✅ ' + res.message, classes: 'green' });
            showPage('panel');
            cargarTareasTecnico(); // Refresca la lista
          } else {
            // Si falla por IP duplicada u otro error controlado
            Swal.fire({

    function prepararReemplazo(idUbicacion) {
      const idNuevo = prompt(`Sustitución para ${idUbicacion}.\nIngrese el ID del nuevo hardware (Ej: CAM-SN-123 o CAM-L-001):`);

      if (idNuevo) {
        // Validación básica: que no sea igual al que ya está
        if (idNuevo.toUpperCase() === idUbicacion.toUpperCase()) {
          M.toast({ html: '❌ El ID nuevo no puede ser igual al actual', classes: 'red' });
          return;
        }

        M.toast({ html: 'Procesando enroque...', classes: 'purple' });

        const data = {
          idUbicacion: idUbicacion,
          idNuevoHardware: idNuevo.toUpperCase()
        };

        google.script.run
          .withSuccessHandler(res => {
            if (res.success) {
              M.toast({ html: '✅ Cambio registrado en inventario', classes: 'green' });
              showPage('panel'); // Volver al inicio
              cargarDataMaestra(); // Refrescar el buscador para que vea los cambios
            } else {
              M.toast({ html: '❌ Error: ' + res.message, classes: 'red' });
            }
          })
          .ejecutarReemplazoFisico(data);
      }
    }

    // Escuchar el envío del formulario de mantenimiento
    function inicializarFormularioMantenimiento() {
      const formMant = document.getElementById('form-mantenimiento');
      if (!formMant) return;

      formMant.addEventListener('submit', function (e) {
        e.preventDefault();

        const id = document.getElementById('maint-id').value;
        if (!id) {
          M.toast({ html: '❌ No hay ID válido', classes: 'red' });
          return;
        }

        const cable = document.getElementById('mant-cable').value || 0;

        // Construir lista de tareas realizadas según los checks
        let tareas = [];
        if (document.getElementById('maint-switch').checked) tareas.push("Switch OK");
        if (document.getElementById('maint-bocas').checked) tareas.push("Bocas OK");
        if (document.getElementById('maint-fichas').checked) tareas.push("Fichas RJ45");
        if (document.getElementById('maint-limpieza').checked) tareas.push("Limpieza Óptica");
        if (document.getElementById('maint-enfoque').checked) tareas.push("Re-enfocado");

        const data = {
          id: id,
          tipoAccion: 'MANTENIMIENTO_SITIO',
          metrosCable: cable,
          tareasRealizadas: tareas.join(", "),
          observaciones: document.getElementById('maint-obs').value
        };

        M.toast({ html: 'Guardando informe...', classes: 'blue' });

        google.script.run
          .withSuccessHandler(res => {
            if (res && res.success) {
              M.toast({ html: '✅ Mantenimiento registrado con éxito', classes: 'green' });
              // Volver al panel después de guardar
              setTimeout(() => {
                showPage('panel-page');
                cargarDataMaestra(); // Actualizar datos
              }, 1000);
            } else {
              M.toast({ html: '❌ Error: ' + (res?.message || 'Desconocido'), classes: 'red' });
            }
          })
          .withFailureHandler(err => {
            M.toast({ html: '❌ Error al guardar', classes: 'red' });
          })
          .procesarSolicitudUnificada(data);
      });
    }

    function reportarFallaCOM(id, tipoReporte) {
      const activo = DATA_MAESTRA.find(a => a.ID === id);
      const direccion = activo ? activo.DIRECCION : "Sin dirección";

      // Personalizamos el mensaje del prompt según el tipo
      let mensajePrompt = `Ingrese observaciones para el reporte de ${tipoReporte}:`;
      if (tipoReporte === 'PODA') mensajePrompt = "Especifique qué tapa la cámara (ej: Rama lateral derecha):";

      const obs = prompt(mensajePrompt);

      if (obs !== null) { // Si no canceló el prompt
        M.toast({ html: `Enviando reporte de ${tipoReporte}...`, classes: 'blue' });

        const data = {
          id: id,
          tipoAccion: 'REPORTE_COM',
          tipoFalla: tipoReporte, // PODA, LIMPIEZA, MOVIMIENTO, DESENFOQUE
          direccion: direccion,
          observaciones: obs
        };

        google.script.run
          .withSuccessHandler(res => {
            M.toast({ html: `✅ ${tipoReporte} reportado correctamente`, classes: 'green' });
          })
          .procesarSolicitudUnificada(data);
      }
    }

    // función adicional para botones de Secretario / Admin

      const activo = DATA_MAESTRA.find(a => a.ID === id);
      const direccion = activo ? activo.DIRECCION : "Sin dirección";
      const obs = prompt("Ingrese comentario o instrucción interna:");

        google.script.run

          .procesarSolicitudUnificada(data);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      M.AutoInit();

      // 1. CARGA DE DATOS (Asegura que esto sea lo primero)
      cargarDataMaestra();
      cargarConfiguracionInicial();

      // Inicializar formularios especiales
      inicializarFormularioMantenimiento();

      // Listeners de Formularios (Optimizado)
      const forms = [
        { id: 'form-nuevo-tablero', func: enviarAltaNueva },
        { id: 'form-finalizar-tecnico', func: enviarFinalizacionInstalacion },
        { id: 'form-mantenimiento', func: null }, // El de mantenimiento lo manejas aparte abajo
        {
          id: 'form-energia-insumos', func: () => {
            const datos = {
              id: document.getElementById('energiaActivoId').value,
              tipoAccion: 'ACTUALIZAR_ENERGIA',
              observaciones: document.getElementById('obsFinales').value
            };
            ejecutarEnvioGenerico(datos, document.getElementById('form-energia-insumos'));
          }
        }
      ];

      forms.forEach(f => {
        const el = document.getElementById(f.id);
        if (el && f.func) {
          el.addEventListener('submit', (e) => { e.preventDefault(); f.func(); });
        }
      });

      // 2. BUSCADOR CON TIMER Y CHECKBOXES
      const inputMaestro = document.getElementById('input-busqueda-maestra');
      let timerBusqueda;

      if (inputMaestro) {
        inputMaestro.addEventListener('input', (e) => {
          clearTimeout(timerBusqueda);
          timerBusqueda = setTimeout(() => {
            ejecutarBusquedaMaestra();
          }, 300);
        });

        // Permitir Enter para buscar instantáneamente
        inputMaestro.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            clearTimeout(timerBusqueda);
            ejecutarBusquedaMaestra();
          }
        });
      }

      // 3. Filtros de categoría (checkboxes)
      document.querySelectorAll('#filtrosBusqueda input[type="checkbox"]').forEach(cb => {
        cb.addEventListener('change', () => {
          ejecutarBusquedaMaestra(); // Ejecutar búsqueda con filtros actualizados
        });
      });

      document.getElementById("input-busqueda-maestra")
        .addEventListener("input", function () {

          clearTimeout(timerBusqueda);

          timerBusqueda = setTimeout(() => {
            ejecutarBusquedaMaestra(this.value);
          }, 200);
        });

      // Forzar mayúsculas en IDs
      ['idDefinitivo', 'energia-id-oculto', 'red-id-oculto'].forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.addEventListener('input', function () {
            this.value = this.value.toUpperCase().replace(/\s/g, '');
          });
        }
      });

      // Botones Volver y Tarjetas
      document.querySelectorAll('.btn-volver').forEach(btn => {
        btn.onclick = (e) => {
          e.preventDefault();
          showPage('panel-page');
        };
      });

      document.querySelectorAll('.boton-tarjeta').forEach(boton => {
        boton.addEventListener('click', function () {
          const pagina = this.getAttribute('data-page');
          if (pagina === 'mapa') window.open('https://maps.google.com', '_blank');
          else if (pagina) showPage(pagina);
        });
      });
    });

    function dibujarFichaTecnica(id, tipo, data) {
      const contenedor = document.getElementById('contenedor-detalle-ficha');
      if (!contenedor) return;

      // 1. Construir lista de detalles
      let htmlDetalles = '<ul class="collection with-header shadow-fuerte">';
      htmlDetalles += `
        <li class="collection-header blue darken-4 white-text">
            <h5 style="margin:0;">${id}</h5>
            <span style="font-size:0.9rem; opacity:0.8;">${tipo}</span>
        </li>`;

      const formatValue = (v) => (v instanceof Date) ? v.toLocaleDateString() : v;

      for (const campo in data.detalles) {
        const valor = data.detalles[campo] || '-';
        htmlDetalles += `
            <li class="collection-item">
                <span class="grey-text" style="font-size: 0.75rem; display:block; text-transform: uppercase;">${campo}</span>
                <span style="font-weight: 500;">${formatValue(valor)}</span>
            </li>`;
      }
      htmlDetalles += '</ul>';

      // 2. Botón de Acción Unificado
      // Este botón abre el modal principal de opciones (donde estará Reporte, Mantenimiento, etc.)
      const btnAccion = `
        <div style="margin-top:20px;">
            <button class="btn-large blue darken-2 waves-effect waves-light w-100" 
                    onclick="abrirAccionesActivo('${id}', '${tipo}')">
                <i class="material-icons left">apps</i> ACCIONES Y GESTIÓN
            </button>
        </div>`;

      contenedor.innerHTML = htmlDetalles + btnAccion;
    }

    function actualizarContadores() {
      if (!DATA_MAESTRA) return;
      const conteos = {
        'TODO': DATA_MAESTRA.length,
        'CAMARAS': 0,
        'TABLEROS': 0,
        'ALARMAS': 0,
        'TAREAS': 0,
        'SOLICITUDES': 0,
        'SWITCHES': 0
      };
      DATA_MAESTRA.forEach(item => {
        if (conteos.hasOwnProperty(item.TIPO_HOJA)) {
          conteos[item.TIPO_HOJA]++;
        }
      });
      // Actualizar los numeritos en los botones
      for (const key in conteos) {
        const el = document.getElementById(`count-${key}`);
        if (el) el.innerText = `(${conteos[key]})`;
      }
    }

    // Prevenir pérdida de datos si hay campos llenos
    window.onbeforeunload = function () {
      const inputs = document.querySelectorAll('input[type="text"], textarea');
      for (let i = 0; i < inputs.length; i++) {
        if (inputs[i].value.length > 5 && inputs[i].offsetParent !== null) {
          return "¿Seguro que quieres salir? Tienes cambios sin guardar.";
        }
      }
    };
